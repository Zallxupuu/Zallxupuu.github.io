<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN PAGE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <div class="login-card">
            <h1>LOGIN</h1>
            <form action="main/index.html">
                <label for="nama">Masukkan Nama :</label><br>
                <input type="text" required placeholder="Masukkan Nama"><br>
                <label for="email">Masukkan Email :</label><br>
                <input type="email" required placeholder="example@gmail.com"><br>
                <label for="password">Masukkan Password :</label><br>
                <input type="password" required placeholder="Masukkan password"><br>
                <p>belum pernah login? <br><a href="">daftar sekarang</a></p>
                <div class="button">
                <button href="main/index.html" class="btn">LOGIN</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
